name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings -A clippy::too_many_arguments

      - name: Test
        run: cargo test
